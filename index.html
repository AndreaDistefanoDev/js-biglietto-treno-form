<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1 class="p-3">CALCOLA IL PREZZO DEL TUO BIGLETTO</h1>
    <div class="container">
        <form>
            <div class="card">
                <div class="row">
                    <div class="col p-3">
                        <label for="user">Nome</label><br>
                        <input type="text" id="user" placeholder="Scrivi il tuo Nome" required><br>
                    </div>
                    <label for="surname">Cognome</label><br>
                    <input type="text" id="surname" placeholder="Scrivi il tuo Cognome"><br>
                    <label for="km">Km da percorrere</label><br>
                    <input type="number" id="km" placeholder="0 km" required><br>
                    <label for="age">Fascia d'età</label><br>
                    <select id="age" required><br>
                        <option value="adult">Maggiorenne</option>
                        <option value="underage">Minorenne</option>
                    </select><br>
                    <button type="submit" id="generate">Genera</button>
                    <button type="reset" id="delate">Annulla</button>
                </div>
            </div>
        </form>
    </div>
    <h1>IL TUO BIGLIETTO</h1>
    <section>
        <div class="conteiner">
            <h3>DETTAGLI TICKET</h3>

            <div class="card">
                <div class="card-body">
                    <div>
                        <span><strong>NOME</strong></span><br>
                        <span id="nome_passeggero"></span>
                    </div>
                    <div>
                        <span><strong>COGNOME</strong></span><br>
                        <span id="cognome_passeggero"></span>
                    </div>
                    <div>
                        <span><strong>Offerta</strong></span><br>
                        <span id="offerta"></span>
                    </div>
                    <div>
                        <span><strong>Carrozza</strong></span><br>
                        <span id="carrozza"></span>
                    </div>
                    <div>
                        <span><strong>Codice Cp</strong></span><br>
                        <span id="codice_cp"></span>
                    </div>
                    <div>
                        <span><strong>Totale Biglietto</strong></span><br>
                        <span id="total_price"></span>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <script src="./assets/js/main.js"></script>
</body>

</html>
